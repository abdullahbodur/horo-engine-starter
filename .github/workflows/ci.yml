name: Starter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build · ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            label: Linux / GCC
            configure: cmake --preset debug
            build: cmake --build --preset debug --parallel
          - os: windows-latest
            label: Windows / MSVC
            configure: cmake --preset debug-msvc
            build: cmake --build build/debug-msvc --config Debug --parallel
          - os: macos-latest
            label: macOS / Clang
            configure: cmake --preset debug
            build: cmake --build --preset debug --parallel

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev \
            libgl1-mesa-dev libglu1-mesa-dev

      - name: Install Ninja on macOS
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cmake/fetchcontent
          key: starter-fetchcontent-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', '**/CMakePresets.json') }}
          restore-keys: |
            starter-fetchcontent-${{ runner.os }}-

      - name: Configure
        run: ${{ matrix.configure }}
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Build
        run: ${{ matrix.build }}
